        {"name": "Ужин: гречка с котлетой", "calories": 550, "protein_g": 35, "fat_g": 18, "carbs_g": 58}
      ],
      "total": {"name": "Итого", "calories": 1320, "protein_g": 75, "fat_g": 36, "carbs_g": 168},
      "water_gl": 1.8,
      "health_score": 7,
      "analysis": "Хороший баланс БЖУ. Белка достаточно, но можно добавить овощей для клетчатки.",
      "tips": ["Добавьте овощной салат к ужину", "Пейте больше воды между приемами пищи"]
